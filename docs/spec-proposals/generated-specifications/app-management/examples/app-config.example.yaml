# app-management 統合草案の設定例 (未承認・草案)
# 参照: 02-architecture-and-runtime.md, 05-persistence-strategy.md, 13-security-backup-migration.md

schema_version: "0.1"

server:
  bind_host: 127.0.0.1
  bind_port_candidates: [8765, 8766, 8767]
  open_browser_on_start: true

database:
  engine: sqlite
  path: data/app.db
  auto_migrate_on_start: true
  backup_before_migration: true

job_execution:
  mode: subprocess
  max_concurrent_jobs: 1

engines:
  voicevox:
    base_url: "http://localhost:50021"
    required: false
  coeiroink:
    base_url: "http://localhost:50032"
    required: false
    status: not_implemented

ai:
  model_policy_id: default-gemini-routing

logging:
  job_event_retention: unlimited
