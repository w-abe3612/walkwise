schema_version: "1.0"
profile_id: kindle-win-legacy-2200x1900
status: requires_smoke_test

target:
  os: windows
  application: kindle_for_pc
  window_title_keywords:
    - Kindle
    - kindle

display:
  theme: null
  font: null
  zoom_level: null
  monitor_scale: null

capture_region:
  left: 0
  top: 0
  width: 2200
  height: 1900

focus:
  method: user_manual

page_turn:
  method: click
  wait_seconds: 1.2
  click:
    offset_x_from_right: 80
    offset_y_from_center: 80
  key: right
  retry:
    max_attempts: 3
    backoff_seconds: 1.0

verification:
  smoke_test_status: pending
  require_manual_preview_confirmation: true
  exact_hash_algorithm: sha256
  perceptual_hash:
    enabled: true
    maximum_distance: null

provenance:
  legacy_source: config/capture_settings.json
  migrated_at: "2026-07-19"
